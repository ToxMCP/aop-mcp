name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      AOP_MCP_ENABLE_FIXTURE_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check tracked files for secrets
        run: python scripts/check_no_secrets.py

      - name: Verify source tree compiles
        run: python -m compileall src tests scripts

  runtime-contract:
    name: Runtime Contract
    runs-on: ubuntu-latest

    env:
      AOP_MCP_ENABLE_FIXTURE_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate schema-heavy regression surface
        run: |
          pytest tests/unit/test_schema_validation.py tests/unit/test_mcp_smoke.py -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build hosted runtime image
        run: docker build -t aop-mcp:ci .

      - name: Verify app import inside image
        run: docker run --rm --entrypoint python aop-mcp:ci -c "import src.server.api.server"

      - name: Smoke health endpoint
        run: |
          container_id="$(docker run -d -p 8003:8000 aop-mcp:ci)"
          cleanup() {
            docker rm -f "$container_id" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8003/health; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$container_id"
          exit 1

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      AOP_MCP_ENABLE_FIXTURE_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The Track-B governance tests (tests/governance/) shell out to the vendored
      # spine policy engine via a fail-closed Node bridge, so the test job needs Node.
      - name: Setup Node (spine-engine bridge)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Check tracked files for secrets
        run: python scripts/check_no_secrets.py

      - name: Run unit tests
        run: pytest -q

      - name: Verify package imports
        run: python -c "import src.server.api.server"

  # ---------------------------------------------------------------------------
  # Track-B scientific-invariants gate (advisory)
  #
  # Projects the RELEASED aop-mcp assess_aop_confidence.response (an AOP confidence
  # assessment) onto its canonical ToxMCP schema-spine shapes (ClaimRecord +
  # EvidenceAnchor) and runs the vendored, digest-pinned spine policy engine over the
  # projection via a fail-closed Node bridge. It BLOCKS (exit non-zero) on any
  # release-blocking code: scientific anti-overclaim (FREE_TEXT_OVERCLAIM,
  # ABSOLUTE_OR_REGULATORY_OVERCLAIM, CONTEXT_ONLY_OVERCLAIM, AOP_CONTEXT_NOT_KER_EVIDENCE)
  # or meta fail-closed (SOURCE_CONTRACT_VIOLATION, ENGINE_UNAVAILABLE,
  # UNRECOGNIZED_SPINE_SCHEMA_ID, VENDOR_DIGEST_MISMATCH, PROJECTION_INCOMPLETE).
  #
  # aop-mcp's confidence assessment is deterministic + zero-LLM and natively issues an
  # interpretive, non-causal, non-regulatory conclusion, so the gate is GREEN on the
  # pristine corpus — it is a regression tripwire. This job sets up Node (the bridge
  # shells to the vendored engine) and runs vendor:verify FIRST (digest tamper-check).
  #
  # Advisory: no required-status-check on the free-plan repo. PROMOTE-TO-BLOCKING: when
  # the repo gains branch protection / rulesets, mark this job a required check — the
  # gate already exits non-zero on any blocking code.
  # ---------------------------------------------------------------------------
  scientific-invariants:
    name: Scientific Invariants (Track-B)
    runs-on: ubuntu-latest

    env:
      AOP_MCP_ENABLE_FIXTURE_FALLBACK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Node (bridge shells to the vendored spine engine)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Verify vendored spine-engine digests (vendor:verify)
        run: python scripts/vendor_verify.py

      - name: Run Track-B governance test suite (per-code bites + guard + fail-closed)
        run: pytest tests/governance -q

      - name: Run scientific-invariants gate on the released corpus
        run: python scripts/scientific_invariants_gate.py
