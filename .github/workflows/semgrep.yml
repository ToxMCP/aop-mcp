name: Semgrep SAST

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep (p/python + p/secrets)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          pip install semgrep==1.167.0

      - name: Run Semgrep SAST gate
        run: |
          semgrep scan \
            --config p/python \
            --config p/secrets \
            --error \
            --metrics=off \
            src
